<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serverpanel | CrafiiHost</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#3b82f6;
  --primary-glow:#60a5fa;
  --secondary:#050507;
  --card:#0b0b12;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050507;
  color:var(--text);
  overflow-x:hidden;
  transition:filter .3s ease;
}

/* HERO */
/* HERO FLOAT */
.hero img{
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-20px);}
}

/* BUTTON HOVER GLOW */
.btn-primary:hover{
  box-shadow:0 0 25px rgba(96,165,250,0.8);
  transform:translateY(-3px);
}

.btn-outline:hover{
  background:rgba(167,139,250,0.1);
  transform:translateY(-3px);
}

/* BUTTON CLICK */
.btn:active{
  transform:scale(.95);
}

/* SECTION FADE IN */
section{
  animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

/* POPUP SHAKE */
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}

.shake{
  animation:shake .4s ease;
}

/* POPUP FADE BG */
.popup{
  transition:opacity .4s ease, backdrop-filter .4s ease;
}

/* POPUP CARD SCALE */
.popup-card{
  transition:.45s cubic-bezier(.68,-0.55,.27,1.55);
}

/* ERROR ICON PULSE */
.error-icon{
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="hero">
  <img src="Logo.png">
  <div class="banner-text">
    The Perfect <strong>Hosting</strong> for free servers!
  </div>
</div>

<section>

<div class="top-create-btn">
  <button class="btn btn-primary" onclick="openPopup('createPopup')">
    Create Server
  </button>
</div>

<div class="center-empty">
  No server found
</div>

</section>

<footer style="text-align:center;padding:40px;color:var(--text);border-top:1px solid rgba(167,139,250,0.15);">
  © 2026 <span style="color:var(--primary);font-weight:600;">CrafiiHost</span>
</footer>

<!-- POPUPS -->

<div id="createPopup" class="popup">
  <div class="popup-card">
    <h2>Create Server</h2>
    <input type="text" id="name" placeholder="Server Name">
    <select id="type">
        <option value="">Select Type</option>
        <option value="Minecraft">Minecraft</option>
        <option value="TeamSpeak3">TeamSpeak3</option>
        <option value="Htyale">Hytale</option>
    </select>

    <div class="popup-actions">
      <button class="btn btn-primary" onclick="createWorld()">Erstellen</button>
      <button class="btn btn-outline" onclick="closePopup('createPopup')">Abbrechen</button>
    </div>
  </div>
</div>

<div id="limitError" class="popup">
  <div class="popup-card">
    <img src="error.png" class="error-icon">
    <h2>Error</h2>
    <p>Maximum Server Amount reached.</p>
    <button class="btn btn-primary" onclick="closePopup('limitError')">Close</button>
  </div>
</div>

<script>
<script>
let serverCount = 0;
const MAX_SERVERS = 1;

function openPopup(id){
  const popup = document.getElementById(id);
  popup.classList.add("active");
}

function closePopup(id){
  const popup = document.getElementById(id);
  popup.classList.remove("active");
}

function createWorld(){
  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const card = document.querySelector("#createPopup .popup-card");

  if(!name || !type){
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),400);
    return;
  }

  if(serverCount >= MAX_SERVERS){
    closePopup("createPopup");
    setTimeout(()=>openPopup("limitError"),300);
    return;
  }

  serverCount++;

  closePopup("createPopup");

  const empty = document.querySelector(".center-empty");
  empty.innerHTML = `
    <div style="animation:fadeUp .6s ease forwards;">
      <strong>${name}</strong><br>
      <span style="color:var(--muted)">${type}</span>
    </div>
  `;
}
</script>

</body>
</html>
