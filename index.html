<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wartungsarbeiten | CrafiiHost</title>
<link rel="icon" type="image/png" href="favicon-error.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#3b82f6;
  --primary-glow:#60a5fa;
  --secondary:#050507;
  --card:#0b0b12;
  --text:#e5e7eb;
}
*{box-sizing:border-box;}
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050507;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}
.hero {
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.hero img {
  width:300px;
  max-width:80%;
  margin-bottom:20px;
  filter:drop-shadow(0 0 50px rgba(59,130,246,0.9));
}
h1 {
  font-family:'Orbitron',sans-serif;
  font-size:5rem;
  margin:0 0 10px 0;
  color:var(--primary);
}
p {
  font-size:1.2rem;
  margin:0 0 20px 0;
}
.btn {
  padding:14px 28px;
  font-size:1rem;
  border-radius:12px;
  font-weight:600;
  text-decoration:none;
  color:#050507;
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  box-shadow:0 10px 30px rgba(59,130,246,0.45);
  transition:all .25s ease;
}
.btn:hover {
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 18px 50px rgba(59,130,246,0.6);
}
footer {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:0.85rem;
  color:var(--text);
}
</style>
</head>
<body>
<div class="hero">
  <img src="Logo.png" alt="Logo">
  <h1>Wartungsarbeiten</h1>
  <p>Wir sind aktuell in Wartungsarbeiten! Bitte habe etwas geduld.</p>
  <a href="/" class="btn">Neuladen</a>
</div>
<footer>© 2026 <span>CrafiiHost</span></footer>
</body>
</html>
